name: fleetlive
description: "A premium real-time multi-vehicle GPS tracking system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.2
  dio: ^5.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  firebase_core: ^3.1.0
  firebase_database: ^11.1.0
  firebase_auth: ^5.1.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  path_provider: ^2.1.3
  flutter_map_cache: ^2.1.0
  http_cache_file_store: ^2.0.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
